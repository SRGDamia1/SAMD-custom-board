# main configuration file
# Format is self-explanatory. Do not use quotes around multi-word values
[hardware]
# Chip family. Supported options: SAMD21, SAMD51, SAME51
CHIP_FAMILY = SAMD51
# Chip variant. Supported options:
# SAMD21E17A, SAMD21E18A, SAMD21G18A,
# SAMD51G19A, SAMD51J19A, SAMD51J20A, SAMD51N19A, SAMD51N20A, SAMD51P20A
# SAME51J19A, SAME54N20A, SAME54P20A
CHIP_VARIANT = SAMD51N19A
# Does it have external oscillator used as clock source, or is it crystalless?
CRYSTALLESS = 0

# LED pin, if any. If not, comment out
LED_PIN = PIN_PC26

# Neopixel pin, if any; in this case, also provide neopixel count.  If not, comment out
# BOARD_NEOPIXEL_PIN =
# BOARD_NEOPIXEL_COUNT = 1

# DOTSTAR (APA102) data and clock pins, if any. If not, comment out
# BOARD_RGBLED_CLOCK_PIN  =
# BOARD_RGBLED_DATA_PIN   =

# LEDs to indicate TX/RX, if any. If not, comment out
LED_TX_PIN = PIN_PB24
LED_RX_PIN = PIN_PB23

[usb]
# USB Vendor ID and Product ID, see https://www.oshwa.org/2013/11/19/new-faq-on-usb-vendor-id-and-product-id/
# You can request a PID for you board from OpenMoko: https://github.com/openmoko/openmoko-usb-oui
# if you don't have one, use the values below: this is the Vendor ID of Atmel,
# and PID of generic HID device
USB_VID =  0x03EB
USB_PID =  0x2402
# volume label: board shows as USB storage device with this label.
# 11 symbols max; traditionally, ends in BOOT,e.g.
VOLUME_LABEL = STONEFLBOOT



[names]
# machine-friendly board name, used as directory name in filesystem
# all lower case, no spaces or special characters except underscores, add _m0 or _m4 at the end
# NOTE: You MUST have a unique BOARD_NAME for each board variant and hardware version!
BOARD_NAME = stonefly_m4
# Board version; intended for hardware versions where a very similar board has slightly different pin arrangements across versions.
BOARD_VERSION = 0.3.7
# Human-readable board name
# This should be unique for each board variant and hardware version
BOARD_NAME_LONG = EnviroDIY Stonefly
# DEFINE_NAME is used to set a compile-time macro ARDUINO_DEFINE_NAME
# if you leave this blank, the board name will be used, but converted to upper case and with non-alphanumeric characters replaced by underscores
# NOTE: This does not need to be unique for each hardware version.
# The version number is set as a separate define.
BOARD_DEFINE_NAME = STONEFLY

[m4_usart_options]
# This contains settings necessary to build bootloader on SAMD51/SAME51 boards.
# There is no proper documentation for them, unfortunately - just copy and paste from
# other boards, see: https://github.com/adafruit/uf2-samdx1
# These are only needed for SAMD51/SAME51; they should be commented for SAMD21

# The boot USART module should be an empty SERCOM that is configured as USART
BOOT_USART_MODULE              =  SERCOM1
BOOT_USART_MASK                =  APBAMASK
BOOT_USART_BUS_CLOCK_INDEX     =  MCLK_APBAMASK_SERCOM1
# ^ should be MCLK_APBAMASK_SERCOM# where # is the SERCOM number of the BOOT_USART_MODULE

# Set which pad number is used for Rx and which for Tx
BOOT_USART_PAD_SETTINGS        =  UART_RX_PAD1_TX_PAD0
# The pad settings for the chosen SERCOM
# Use PINMUX_UNUSED if the pin isn't used
# otherwise use PINMUX_P{pad letter}{sercom use code, C for main, D for alt}_SERCOM{boot sercom number}_PAD{sercom pad #}
BOOT_USART_PAD3                =  PINMUX_UNUSED
BOOT_USART_PAD2                =  PINMUX_UNUSED
BOOT_USART_PAD1                =  PINMUX_PA17C_SERCOM1_PAD1
BOOT_USART_PAD0                =  PINMUX_PA16C_SERCOM1_PAD0
# The clock settings for the chosen SERCOM
# you should only need to change the SERCOM number to match yours
BOOT_GCLK_ID_CORE              =  SERCOM1_GCLK_ID_CORE
BOOT_GCLK_ID_SLOW              =  SERCOM1_GCLK_ID_SLOW

[bootloader_extras]
# Experts only.
# If you have any additional options you want to include in bootloader, please enter
# them below. Any option of the form OPTION_NAME = VALUE
# will produce a line of the form
# #define OPTION_NAME     VALUE
# in board_config.h file used to build the bootloader
# e.g.
# BOARD_NEOPIXEL_POWERPIN = PIN_PA11
# LED_PIN_PULLUP = 1

[additional_build_flags]
# Experts only.
# -D__{chip_variant}__ is always added
# For a SAMD21, these are added:
#    -DARDUINO_SAMD_ZERO -DARM_MATH_CM0PLUS
# For a SAMD51, these are added:
#  -D__SAMD51__ -D__FPU_PRESENT -DARM_MATH_CM4 -mfloat-abi=hard -mfpu=fpv4-sp-d16 -DENABLE_CACHE
# If you have any additional GCC build flags that you want to add, put them here as space-separated list
EXTRA_EXTRA_FLAGS = -DENVIRODIY_STONEFLY -DENVIRODIY_STONEFLY_M4 -DSD_CHIP_SELECT_MODE=1
# "-DVARIANT_QSPI_BAUD_DEFAULT=50000000"

# For SdFat, defining SD_CHIP_SELECT_MODE as 1 allow overwriting the functions to set the pin mode and level for the SS (slave/chip) select mode
# Chip select mode 1 allows you to write your own functions without requiring it.
# By default, SdFat initializes the SS pin by setting pin mode to OUTPUT,
# prepares to write by setting the SS pin to LOW,
# and finishes communication by setting the SS pin to HIGH.
# ```cpp
# void sdCsInit(SdCsPin_t pin) {
#   initCalls++;
#   pinMode(pin, OUTPUT);
# }
# void sdCsWrite(SdCsPin_t pin, bool level) {
#   writeCalls++;
#   digitalWrite(pin, level);
# }
# ```
# When using hardware SS (MSSEN, the default for the SAMD21 and SAMD15 in the Adafruit core) this is not necessary because the processor
# sets the pin automatically.
# Instead you can add these functions:
# ```cpp
# void sdCsInit(SdCsPin_t pin) {}
# void sdCsWrite(SdCsPin_t pin, bool level) {}
# ```

# cSpell:words ifdefs myboard MSSEN DVARIANT DENABLE DARM DARDUINO DENVIRODIY MFLOAT MFPU POWERPIN PULLUP GCLK PINMUX UART
